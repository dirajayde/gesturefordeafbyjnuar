<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face & Hand Tracking + Gesture</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #input_video {
            display: none;
        }

        #output_canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            font-size: 24px;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
        }

        .status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }

        .gesture-info {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-family: sans-serif;
            font-size: 18px;
            z-index: 10;
            background: rgba(255, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 200px;
        }

        .gesture-emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 5px;
        }

        .gesture-name {
            font-size: 16px;
            font-weight: bold;
        }

        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-family: sans-serif;
            font-size: 18px;
            z-index: 10;
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
    </style>

    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="loading" id="loadingText">
        🔄 Sabar yaa kink.<br>
        <small style="font-size: 14px; color: #aaa;">Mohon tunggu 5-10 detik</small>
    </div>

    <div class="status" id="statusText">
        📊 Status: Menunggu kamera...
    </div>

    <div class="gesture-info" id="gestureInfo" style="display: none;">
        <span class="gesture-emoji" id="gestureEmoji">👋</span>
        <span class="gesture-name" id="gestureName">Tidak ada gesture</span>
    </div>

    <div class="error" id="errorText"></div>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loadingText');
        const statusText = document.getElementById('statusText');
        const errorText = document.getElementById('errorText');
        const gestureInfo = document.getElementById('gestureInfo');
        const gestureEmoji = document.getElementById('gestureEmoji');
        const gestureName = document.getElementById('gestureName');

        let faceCount = 0;
        let handCount = 0;
        let frameCount = 0;
        let lastGesture = '';
        let gestureTimer = 0;

        // Fungsi untuk menampilkan error
        function showError(message) {
            errorText.style.display = 'block';
            errorText.innerHTML = `❌ ${message}`;
            loadingText.style.display = 'none';
        }

        // Fungsi untuk menampilkan status
        function updateStatus(message) {
            statusText.innerHTML = `📊 Status: ${message}`;
        }

        // Fungsi untuk update gesture info
        function updateGestureInfo(emoji, name) {
            gestureInfo.style.display = 'block';
            gestureEmoji.textContent = emoji;
            gestureName.textContent = name;
        }

        // Fungsi untuk deteksi gesture tangan
        function detectGesture(landmarks) {
            const thumbTip = landmarks[4];
            const thumbIP = landmarks[3];
            const thumbMCP = landmarks[2];
            const indexTip = landmarks[8];
            const indexPIP = landmarks[6];
            const indexMCP = landmarks[5];
            const middleTip = landmarks[12];
            const middlePIP = landmarks[10];
            const middleMCP = landmarks[9];
            const ringTip = landmarks[16];
            const ringPIP = landmarks[14];
            const ringMCP = landmarks[13];
            const pinkyTip = landmarks[20];
            const pinkyPIP = landmarks[18];
            const pinkyMCP = landmarks[17];
            const wrist = landmarks[0];

            // Cek apakah jari terbuka atau tertutup
            function isFingerOpen(tip, pip, mcp) {
                return tip.y < pip.y && tip.y < mcp.y;
            }

            // Hitung jumlah jari terbuka
            const fingersOpen = [
                isFingerOpen(thumbTip, thumbIP, thumbMCP),
                isFingerOpen(indexTip, indexPIP, indexMCP),
                isFingerOpen(middleTip, middlePIP, middleMCP),
                isFingerOpen(ringTip, ringPIP, ringMCP),
                isFingerOpen(pinkyTip, pinkyPIP, pinkyMCP)
            ].filter(Boolean).length;

            // Cek posisi jari telunjuk dan jari tengah
            const indexExtended = indexTip.y < indexPIP.y;
            const middleExtended = middleTip.y < middlePIP.y;
            const ringExtended = ringTip.y < ringPIP.y;
            const pinkyExtended = pinkyTip.y < pinkyPIP.y;

            // Cek jarak antara jari telunjuk dan ibu jari
            const thumbIndexDistance = Math.sqrt(
                Math.pow(thumbTip.x - indexTip.x, 2) + 
                Math.pow(thumbTip.y - indexTip.y, 2)
            );

            // Cek jarak antara jari telunjuk dan kelingking
            const indexPinkyDistance = Math.sqrt(
                Math.pow(indexTip.x - pinkyTip.x, 2) + 
                Math.pow(indexTip.y - pinkyTip.y, 2)
            );

            // Deteksi gesture
            let gesture = { emoji: '👋', name: 'Tidak ada gesture' };

            // 🫶 LOVE HANDS (Dua tangan dengan jari terbuka)
            if (fingersOpen >= 4 && indexExtended && middleExtended) {
                gesture = { emoji: '🫶', name: 'Love Hands' };
            }
            // 🤘 ROCK ON (Jari telunjuk dan kelingking)
            else if (indexExtended && pinkyExtended && !middleExtended && !ringExtended) {
                gesture = { emoji: '🤘', name: 'Rock On' };
            }
            // 🤟 I LOVE YOU (Jari telunjuk, tengah, kelingking)
            else if (indexExtended && middleExtended && pinkyExtended && !ringExtended) {
                gesture = { emoji: '🤟', name: 'I Love You' };
            }
            // 👍 THUMBS UP (Ibu jari naik, jari lain turun)
            else if (isFingerOpen(thumbTip, thumbIP, thumbMCP) && 
                     !isFingerOpen(indexTip, indexPIP, indexMCP) &&
                     !isFingerOpen(middleTip, middlePIP, middleMCP) &&
                     !isFingerOpen(ringTip, ringPIP, ringMCP) &&
                     !isFingerOpen(pinkyTip, pinkyPIP, pinkyMCP)) {
                gesture = { emoji: '👍', name: 'Thumbs Up' };
            }
            // 👌 OK SIGN (Ibu jari dan telunjuk membentuk lingkaran)
            else if (thumbIndexDistance < 0.1 && 
                     !isFingerOpen(indexTip, indexPIP, indexMCP) &&
                     !isFingerOpen(middleTip, middlePIP, middleMCP) &&
                     !isFingerOpen(ringTip, ringPIP, ringMCP) &&
                     !isFingerOpen(pinkyTip, pinkyPIP, pinkyMCP)) {
                gesture = { emoji: '👌', name: 'OK Sign' };
            }
            // 🖕 MIDDLE FINGER (Hanya jari tengah naik)
            else if (middleExtended && !indexExtended && !ringExtended && !pinkyExtended) {
                gesture = { emoji: '🖕', name: 'Middle Finger' };
            }
            // 🫰 PINCH (Jari telunjuk dan ibu jari berdekatan)
            else if (thumbIndexDistance < 0.05 && fingersOpen === 2) {
                gesture = { emoji: '🫰', name: 'Pinch' };
            }
            // ✋ OPEN HAND (Semua jari terbuka)
            else if (fingersOpen === 5) {
                gesture = { emoji: '✋', name: 'Open Hand' };
            }
            // ✊ CLOSED FIST (Semua jari tertutup)
            else if (fingersOpen === 0) {
                gesture = { emoji: '✊', name: 'Closed Fist' };
            }
            // 👆 POINTING (Hanya jari telunjuk naik)
            else if (indexExtended && !middleExtended && !ringExtended && !pinkyExtended) {
                gesture = { emoji: '👆', name: 'Pointing' };
            }

            return gesture;
        }

        // Fungsi untuk menggambar hasil
        function onResults(results) {
            frameCount++;
            
            // Sembunyikan loading setelah beberapa frame
            if (frameCount > 10) {
                loadingText.style.display = 'none';
            }
            
            // Set ukuran canvas
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Gambar video asli
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // Update status
            faceCount = results.multiFaceLandmarks ? results.multiFaceLandmarks.length : 0;
            handCount = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
            updateStatus(`👤 Wajah: ${faceCount} | ✋ Tangan: ${handCount} | 🎬 Frame: ${frameCount}`);

            // 1. FACE MESH - JARING WAJAH (HIJAU)
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                console.log('✅ Face detected:', results.multiFaceLandmarks.length);
                
                for (const landmarks of results.multiFaceLandmarks) {
                    drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {
                        color: '#00FF0080',
                        lineWidth: 0.5
                    });
                    drawLandmarks(canvasCtx, landmarks, {
                        color: '#FF0000',
                        lineWidth: 1,
                        radius: 1
                    });
                }
            }

            // 2. HAND TRACKING - TANGAN (MERAH) + GESTURE
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                console.log('✅ Hand detected:', results.multiHandLandmarks.length);
                
                for (const landmarks of results.multiHandLandmarks) {
                    // Gambar jaring tangan (MERAH)
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
                        color: '#FF0000',
                        lineWidth: 3
                    });
                    drawLandmarks(canvasCtx, landmarks, {
                        color: '#FF0000',
                        lineWidth: 2,
                        radius: 2
                    });

                    // Deteksi gesture
                    const gesture = detectGesture(landmarks);
                    
                    // Update gesture info (hanya jika berubah)
                    if (gesture.name !== lastGesture) {
                        updateGestureInfo(gesture.emoji, gesture.name);
                        lastGesture = gesture.name;
                        gestureTimer = 0;
                    }
                }
            } else {
                // Reset gesture jika tidak ada tangan
                if (lastGesture !== '') {
                    updateGestureInfo('👋', 'Tidak ada gesture');
                    lastGesture = '';
                }
            }
            
            canvasCtx.restore();
        }

        // --- KONFIGURASI FACE MESH ---
        const faceMesh = new FaceMesh({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
            }
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5,
            modelComplexity: 1
        });

        faceMesh.onResults(onResults);

        // --- KONFIGURASI HANDS ---
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // --- SETUP KAMERA ---
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                try {
                    await faceMesh.send({image: videoElement});
                    await hands.send({image: videoElement});
                } catch (error) {
                    console.error('Error sending frame:', error);
                }
            },
            width: 1280,
            height: 720,
            facingMode: 'user'
        });

        // --- START CAMERA ---
        camera.start()
            .then(() => {
                console.log('✅ Camera started successfully');
                updateStatus('📷 Kamera aktif - Hadapkan wajah ke kamera');
            })
            .catch(error => {
                console.error('❌ Camera start error:', error);
                showError('Gagal mengakses kamera!<br><br>1. Pastikan izin kamera diberikan<br>2. Coba browser lain (Chrome/Edge)<br>3. Pastikan tidak ada aplikasi lain yang menggunakan kamera');
            });

        // --- DEBUGGING ---
        console.log('🚀 Face & Hand Tracking + Gesture App Started');
        console.log('📱 MediaPipe Libraries Loaded');
    </script>
</body>
</html>
